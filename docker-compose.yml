version: "3.9"
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: hydro
      POSTGRES_PASSWORD: hydro
      POSTGRES_DB: hydro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env.example
    volumes:
      - ./apps/api:/app
      - ./data:/data
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./apps/frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    volumes:
      - ./apps/frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
